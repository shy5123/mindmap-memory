name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Run stress tests (quick)
      run: python scripts/stress_test.py --quick

    - name: Run edge tests
      continue-on-error: true
      run: python scripts/edge_tests.py

    - name: Run pre-release tests
      continue-on-error: true
      run: python scripts/pre_release_tests.py
